<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380, initial-scale=1">
  <title>IsItDown</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body data-state="idle">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <img src="../assets/icons/icon48.png" alt="" class="header-logo" width="24" height="24">
      <h1 class="header-title">IsItDown</h1>
    </div>
  </header>

  <!-- Domain Bar -->
  <div class="domain-bar">
    <span id="status-dot" class="status-dot"></span>
    <span id="domain-text" class="domain-text">Detecting…</span>
    <span id="check-ago" class="check-ago"></span>
  </div>

  <!-- Verdict Card -->
  <section id="verdict-card" class="verdict-card">
    <div id="verdict-icon" class="verdict-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4M12 8h.01"/>
      </svg>
    </div>
    <div id="verdict-label" class="verdict-label">Ready to check</div>
    <div id="verdict-sub" class="verdict-sub">Click below to check this site</div>
    <button id="check-btn" class="check-btn" disabled>Check now</button>
  </section>

  <!-- Stats Grid -->
  <section id="stats-grid" class="stats-grid" hidden>
    <div class="stat">
      <div class="stat-label">Response</div>
      <div id="stat-response" class="stat-value">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">HTTP</div>
      <div id="stat-http" class="stat-value">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">DNS</div>
      <div id="stat-dns" class="stat-value">—</div>
    </div>
  </section>

  <!-- Fix Suggestions -->
  <section id="fixes-panel" class="fixes-panel card" hidden>
    <div class="section-title">Try these fixes</div>
    <div id="fix-list" class="fix-list"></div>
    <div class="fix-actions">
      <button id="copy-fixes-btn" class="btn-secondary" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy fix steps
      </button>
      <button id="incognito-btn" class="btn-secondary" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Open incognito
      </button>
    </div>
  </section>

  <!-- Actions -->
  <section id="pro-actions" class="pro-actions card" hidden>
    <button id="watch-btn" class="btn-action" type="button" disabled>🔔 Watch for recovery</button>
    <button id="copy-report-btn" class="btn-action" type="button" disabled>📋 Copy report</button>
  </section>

  <!-- History -->
  <section id="history-panel" class="history-panel card" hidden>
    <div class="section-title">Recent checks</div>
    <div id="history-list" class="history-list"></div>
    <div class="history-footer">
      <button id="clear-history-btn" class="btn-text" type="button">Clear</button>
      <button id="export-csv-btn" class="btn-text" type="button">Export CSV</button>
    </div>
  </section>

  <!-- Monitor List -->
  <section id="monitor-panel" class="monitor-panel card" hidden>
    <div class="monitor-header">
      <div class="section-title">Monitored sites</div>
      <button id="add-monitor-btn" class="btn-add" type="button" disabled>+ Add current site</button>
    </div>
    <div id="monitor-list" class="monitor-list"></div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer-text">IsItDown v1.0.0</span>
  </footer>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="../lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
